<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunicação Sigilosa E2EE (Acesso Direto)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-900 text-white h-screen overflow-hidden flex items-center justify-center font-sans">

    <!-- Tela de Login / Entrada na Sala -->
    <div id="login-screen" class="w-full max-w-sm p-8 glass rounded-2xl border border-gray-700 shadow-2xl transition-all duration-300 z-10">
        <div class="text-center mb-8">
            <i class="fas fa-user-secret text-5xl text-emerald-500 mb-4"></i>
            <h1 class="text-3xl font-bold tracking-tight">Acesso Restrito</h1>
            <p class="text-gray-400 mt-2 text-sm">Insira a credencial de acesso</p>
        </div>
        
        <form id="login-form" class="space-y-5">
            <div>
                <input type="password" id="room-password" required class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-4 text-center text-xl tracking-widest text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors" placeholder="•••••••">
            </div>
            <button type="submit" id="join-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition-colors flex items-center justify-center gap-2">
                <i class="fas fa-sign-in-alt"></i> Acessar
            </button>
            <p id="login-error" class="text-red-400 text-sm text-center hidden"></p>
        </form>
    </div>

    <!-- Interface Principal do Chat -->
    <div id="chat-screen" class="hidden w-full h-full flex flex-col md:flex-row relative">
        
        <!-- Área principal de Chat -->
        <div class="flex-1 flex flex-col h-full bg-gray-900 border-r border-gray-800 relative z-0">
            <!-- Header -->
            <header class="bg-gray-800 border-b border-gray-700 p-4 flex justify-between items-center shadow-md">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-emerald-900 rounded-full flex items-center justify-center border border-emerald-500">
                        <i class="fas fa-shield-alt text-emerald-400"></i>
                    </div>
                    <div>
                        <h2 class="font-bold text-lg leading-tight">Canal Seguro</h2>
                        <p id="user-identity" class="text-xs text-emerald-400 flex items-center gap-1">
                            <i class="fas fa-user-tag text-[10px]"></i> Identidade Gerada
                        </p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button id="btn-leave" class="p-3 text-red-400 hover:text-red-300 hover:bg-gray-700 rounded-full transition-colors" title="Sair e Destruir Sessão">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </button>
                </div>
            </header>

            <!-- Lista de Mensagens -->
            <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-4">
                <div class="text-center text-xs text-gray-500 my-4">
                    <i class="fas fa-lock"></i> As mensagens são criptografadas de ponta-a-ponta.<br>Apenas quem possui a senha pode decifrá-las.
                </div>
                <!-- Mensagens renderizadas dinamicamente aqui -->
            </div>

            <!-- Input Area -->
            <div class="bg-gray-800 border-t border-gray-700 p-4">
                <form id="message-form" class="flex items-center gap-2">
                    <input type="text" id="message-input" autocomplete="off" required class="flex-1 bg-gray-700 border-none rounded-full px-6 py-3 text-white focus:outline-none focus:ring-1 focus:ring-emerald-500 transition-colors" placeholder="Digite sua mensagem...">
                    <button type="submit" class="bg-emerald-600 hover:bg-emerald-500 text-white w-12 h-12 flex items-center justify-center rounded-full shadow-lg transition-transform hover:scale-105">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal de Alerta Customizado -->
    <div id="custom-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 max-w-sm w-full shadow-2xl">
            <h3 id="modal-title" class="text-xl font-bold mb-2">Atenção</h3>
            <p id="modal-message" class="text-gray-300 mb-6"></p>
            <div class="flex justify-end">
                <button id="btn-modal-close" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg font-medium">Entendido</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // UI & UTILITÁRIOS GERAIS
        // ==========================================
        function showModal(title, message) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            document.getElementById('custom-modal').classList.remove('hidden');
        }

        document.getElementById('btn-modal-close').addEventListener('click', () => {
            document.getElementById('custom-modal').classList.add('hidden');
        });

        function scrollToBottom() {
            const container = document.getElementById('messages-container');
            container.scrollTop = container.scrollHeight;
        }

        // ==========================================
        // CONFIGURAÇÃO DO AMBIENTE E FIREBASE
        // ==========================================
        
        // ATENÇÃO: Para rodar em produção (GitHub Pages), substitua os valores abaixo 
        // pelas credenciais geradas no painel do seu projeto Firebase.
        const defaultExternalConfig = {
 apiKey: "AIzaSyBGTSOsg6JcdelyoSPc0MLjQmr0jxwUVdk",
  authDomain: "studio-2554807183-f68d5.firebaseapp.com",
  projectId: "studio-2554807183-f68d5",
  storageBucket: "studio-2554807183-f68d5.firebasestorage.app",
  messagingSenderId: "584439934606",
  appId: "1:584439934606:web:a8289e45da870be89363df"
        };

        const isRunningInCanvas = typeof __firebase_config !== 'undefined';
        const firebaseConfig = isRunningInCanvas ? JSON.parse(__firebase_config) : defaultExternalConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-secure-direct-chat-app';

        let app, auth, db;
        let isFirebaseInitialized = false;

        // Validação estrita para evitar crash silencioso fora do Canvas
        if (!firebaseConfig.apiKey || firebaseConfig.apiKey.includes("COLOQUE_SUA_API_KEY")) {
            console.error("Firebase não configurado para ambiente de produção.");
            setTimeout(() => {
                showModal("Falta de Configuração", "O aplicativo requer infraestrutura (Firebase) para operar. Edite o arquivo HTML e insira suas credenciais no objeto 'defaultExternalConfig'.");
                document.getElementById('join-btn').disabled = true;
                document.getElementById('join-btn').classList.replace('bg-emerald-600', 'bg-gray-600');
            }, 500);
        } else {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            isFirebaseInitialized = true;
        }

        // Constantes estritas definidas na regra de negócio
        const REQUIRED_PASSWORD = "9090123";
        const HARDCODED_ROOM_ID = "sala_secreta_9090123";

        // ==========================================
        // ESTADO GLOBAL DA APLICAÇÃO
        // ==========================================
        const state = {
            user: null,
            username: '',
            roomId: HARDCODED_ROOM_ID,
            cryptoKey: null,
            messagesUnsubscribe: null
        };

        // ==========================================
        // MOTOR CRIPTOGRÁFICO (E2EE Web Crypto API)
        // ==========================================
        
        async function deriveKey(password, saltString) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                "raw",
                enc.encode(password),
                { name: "PBKDF2" },
                false,
                ["deriveBits", "deriveKey"]
            );
            
            const salt = enc.encode(saltString);
            
            return crypto.subtle.deriveKey(
                {
                    name: "PBKDF2",
                    salt: salt,
                    iterations: 100000,
                    hash: "SHA-256"
                },
                keyMaterial,
                { name: "AES-GCM", length: 256 },
                true,
                ["encrypt", "decrypt"]
            );
        }

        async function encryptData(dataString, key) {
            const enc = new TextEncoder();
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encodedData = enc.encode(dataString);
            
            const ciphertext = await crypto.subtle.encrypt(
                { name: "AES-GCM", iv: iv },
                key,
                encodedData
            );
            
            return {
                ciphertext: arrayBufferToBase64(ciphertext),
                iv: arrayBufferToBase64(iv)
            };
        }

        async function decryptData(ciphertextBase64, ivBase64, key) {
            try {
                const ciphertext = base64ToArrayBuffer(ciphertextBase64);
                const iv = base64ToArrayBuffer(ivBase64);
                
                const decryptedData = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: iv },
                    key,
                    ciphertext
                );
                
                const dec = new TextDecoder();
                return dec.decode(decryptedData);
            } catch (error) {
                console.error("Erro na descriptografia:", error);
                return "[Mensagem Ilegível - Dados Corrompidos]";
            }
        }

        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return window.btoa(binary);
        }

        function base64ToArrayBuffer(base64) {
            const binary_string = window.atob(base64);
            const len = binary_string.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binary_string.charCodeAt(i);
            }
            return bytes.buffer;
        }

        // ==========================================
        // AUTENTICAÇÃO E INICIALIZAÇÃO
        // ==========================================
        async function initAuth() {
            if (!isFirebaseInitialized) return;
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Erro na autenticação Firebase:", error);
                showModal("Erro de Conexão", "Falha na autenticação do banco de dados (Verifique as regras do Firestore/Auth).");
            }
        }

        if (isFirebaseInitialized) {
            onAuthStateChanged(auth, (user) => {
                state.user = user;
            });
            initAuth();
        }

        // ==========================================
        // LÓGICA DE LOGIN ESTREITO (Apenas Senha)
        // ==========================================
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!isFirebaseInitialized) {
                showModal("Ação Bloqueada", "O aplicativo não está configurado para acessar a rede.");
                return;
            }

            const btn = document.getElementById('join-btn');
            const errorP = document.getElementById('login-error');
            const passwordInput = document.getElementById('room-password').value;

            // Verificação hardcoded exigida
            if (passwordInput !== REQUIRED_PASSWORD) {
                errorP.textContent = "Acesso Negado. Credencial inválida.";
                errorP.classList.remove('hidden');
                document.getElementById('room-password').value = '';
                return;
            }

            if (!state.user) {
                errorP.textContent = "Conexão rejeitada pelo servidor. Verifique a configuração do Firebase Auth.";
                errorP.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Autenticando...';
            errorP.classList.add('hidden');

            try {
                // Deriva a chave criptográfica usando a senha e a sala hardcoded
                state.cryptoKey = await deriveKey(passwordInput, state.roomId);
                
                // Gera identidade aleatória local
                state.username = `Agente-${Math.floor(Math.random() * 9000) + 1000}`;

                // Transição de tela
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('chat-screen').classList.remove('hidden');
                
                // Atualiza UI com a identidade
                document.getElementById('user-identity').innerHTML = `<i class="fas fa-user-tag text-[10px]"></i> Identidade: ${state.username}`;

                // Inicia a escuta do banco de dados
                startChatListener();

            } catch (error) {
                console.error(error);
                errorP.textContent = "Erro interno no motor criptográfico.";
                errorP.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Acessar';
            }
        });

        // ==========================================
        // LÓGICA DO CHAT (ENVIO E RECEBIMENTO)
        // ==========================================
        
        function getChatCollectionPath() {
            return collection(db, 'artifacts', appId, 'public', 'data', state.roomId);
        }

        async function startChatListener() {
            if (!state.user || !isFirebaseInitialized) return;

            const q = query(getChatCollectionPath()); 

            state.messagesUnsubscribe = onSnapshot(q, async (snapshot) => {
                const container = document.getElementById('messages-container');
                
                // Ordenação na memória
                let docsData = [];
                snapshot.forEach(doc => {
                    docsData.push({ id: doc.id, ...doc.data() });
                });
                
                docsData.sort((a, b) => {
                    const timeA = a.timestamp ? a.timestamp.toMillis() : Date.now();
                    const timeB = b.timestamp ? b.timestamp.toMillis() : Date.now();
                    return timeA - timeB;
                });

                container.innerHTML = `<div class="text-center text-xs text-gray-500 my-4"><i class="fas fa-lock"></i> Canal Estabelecido. Proteção E2EE ativa.</div>`;

                for (const msgData of docsData) {
                    if (!msgData.ciphertext || !msgData.iv) continue;

                    const decryptedPayloadStr = await decryptData(msgData.ciphertext, msgData.iv, state.cryptoKey);
                    
                    try {
                        const payload = JSON.parse(decryptedPayloadStr);
                        renderMessage(msgData.id, payload.content, msgData.senderId === state.user.uid, msgData.senderName);
                    } catch (e) {
                        renderMessage(msgData.id, '[Erro de Decifragem]', msgData.senderId === state.user.uid, msgData.senderName);
                    }
                }
                scrollToBottom();

            }, (error) => {
                console.error("Erro na escuta do Firestore:", error);
                // Tratamento especial para erro de permissão (Missing or insufficient permissions)
                if (error.code === 'permission-denied') {
                    showModal("Acesso Negado (Firestore)", "O banco de dados bloqueou a leitura. Verifique as 'Security Rules' no painel do Firebase.");
                } else {
                    showModal("Desconexão", "A sincronização com a rede falhou.");
                }
            });
        }

        function renderMessage(id, textContent, isMine, senderName) {
            const container = document.getElementById('messages-container');
            const wrapper = document.createElement('div');
            wrapper.className = `flex flex-col ${isMine ? 'items-end' : 'items-start'} mb-4 animate-fade-in`;

            const nameDiv = document.createElement('div');
            nameDiv.className = "text-xs text-gray-400 mb-1 px-1";
            nameDiv.textContent = isMine ? "Você" : senderName;
            wrapper.appendChild(nameDiv);

            const bubble = document.createElement('div');
            bubble.className = `max-w-[85%] rounded-2xl px-4 py-2 shadow-md ${isMine ? 'bg-emerald-600 text-white rounded-tr-none' : 'bg-gray-700 text-white rounded-tl-none'}`;
            
            // Tratamento rigoroso XSS
            const p = document.createElement('p');
            p.className = "break-words whitespace-pre-wrap";
            p.textContent = textContent;
            bubble.appendChild(p);

            wrapper.appendChild(bubble);
            container.appendChild(wrapper);
        }

        async function sendMessage(textContent) {
            if (!state.user || !isFirebaseInitialized) return;
            
            const payloadStr = JSON.stringify({ content: textContent });
            const { ciphertext, iv } = await encryptData(payloadStr, state.cryptoKey);

            try {
                await addDoc(getChatCollectionPath(), {
                    ciphertext: ciphertext,
                    iv: iv,
                    senderId: state.user.uid,
                    senderName: state.username,
                    timestamp: serverTimestamp()
                });
            } catch (error) {
                console.error("Erro ao enviar:", error);
                if (error.code === 'permission-denied') {
                     showModal("Erro de Permissão", "Suas credenciais do Firebase não permitem gravação (Verifique as Security Rules).");
                } else {
                     showModal("Erro de Transmissão", "Falha ao enviar pacote criptografado.");
                }
            }
        }

        document.getElementById('message-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (text) {
                await sendMessage(text);
            }
            
            input.value = '';
            input.focus();
        });

        // ==========================================
        // SAIR DA SALA
        // ==========================================
        document.getElementById('btn-leave').addEventListener('click', () => {
            state.cryptoKey = null;
            
            if (state.messagesUnsubscribe) state.messagesUnsubscribe();

            document.getElementById('messages-container').innerHTML = '';
            document.getElementById('chat-screen').classList.add('hidden');
            
            const loginScreen = document.getElementById('login-screen');
            loginScreen.classList.remove('hidden');
            
            const btn = document.getElementById('join-btn');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Acessar';
            document.getElementById('room-password').value = '';
        });

        const style = document.createElement('style');
        style.innerHTML = `
            .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
            @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        `;
        document.head.appendChild(style);

    </script>
</body>
</html>
