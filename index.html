<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebRTC Camera Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #111827; color: #f3f4f6; font-family: sans-serif; }
        video { width: 100%; max-height: 70vh; background: #000; border-radius: 0.5rem; object-fit: cover; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- Header -->
    <header class="w-full max-w-2xl text-center mb-6">
        <h1 class="text-2xl font-bold text-blue-400">Monitor de Câmera P2P</h1>
        <p class="text-xs text-gray-400 mt-1" id="status-text">Inicializando sistema...</p>
    </header>

    <!-- Seleção de Papel (Role) -->
    <main id="role-selection" class="w-full max-w-sm bg-gray-800 p-6 rounded-lg shadow-lg text-center flex flex-col gap-4">
        <h2 class="text-lg font-semibold mb-2">Escolha a função deste dispositivo:</h2>
        <button id="btn-role-broadcaster" class="bg-blue-600 hover:bg-blue-700 font-bold py-3 px-4 rounded transition-colors">
            🎥 Transmitir Câmera (Servidor)
        </button>
        <button id="btn-role-viewer" class="bg-green-600 hover:bg-green-700 font-bold py-3 px-4 rounded transition-colors">
            👀 Assistir Transmissão (Cliente)
        </button>
    </main>

    <!-- Interface do Transmissor -->
    <section id="broadcaster-ui" class="w-full max-w-2xl hidden flex-col gap-4">
        <div class="bg-gray-800 p-4 rounded-lg shadow flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <span class="text-sm text-gray-400 block">ID da Sala (Envie para o Cliente):</span>
                <span id="room-id-display" class="text-xl font-mono text-yellow-400 select-all tracking-wider font-bold">Gerando...</span>
            </div>
            <div class="flex flex-col gap-2 w-full sm:w-auto">
                <select id="camera-select" class="bg-gray-700 text-white text-sm rounded p-2 border border-gray-600 focus:outline-none focus:border-blue-500 w-full">
                    <option value="">Carregando câmeras...</option>
                </select>
                <button id="btn-toggle-wake" class="bg-yellow-600 hover:bg-yellow-700 text-sm py-2 px-3 rounded transition-colors flex items-center justify-center gap-2">
                    <span id="wake-icon">🔓</span> Tela: Desprotegida
                </button>
            </div>
        </div>
        <video id="local-video" autoplay playsinline muted></video>
        <p class="text-xs text-center text-gray-500 mt-2">Atenção: Não bloqueie a tela do celular. Use o botão acima para impedir que ela apague sozinha, e abaixe o brilho manualmente.</p>
    </section>

    <!-- Interface do Visualizador -->
    <section id="viewer-ui" class="w-full max-w-2xl hidden flex-col gap-4">
        <div class="bg-gray-800 p-4 rounded-lg shadow flex flex-col sm:flex-row gap-2">
            <input type="text" id="join-room-input" placeholder="Digite o ID da Sala..." class="flex-1 bg-gray-700 text-white rounded p-3 border border-gray-600 focus:outline-none focus:border-green-500 font-mono text-center sm:text-left">
            <button id="btn-join-room" class="bg-green-600 hover:bg-green-700 font-bold py-3 px-6 rounded transition-colors w-full sm:w-auto">
                Conectar
            </button>
        </div>
        <video id="remote-video" autoplay playsinline></video>
    </section>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // Constantes e Variáveis Globais
        const configuration = {
            iceServers: [
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ]
        };

        let peerConnection = null;
        let localStream = null;
        let remoteStream = null;
        let wakeLock = null;
        let currentRoomId = null;
        let currentUserId = null;
        
        // Elementos DOM
        const statusText = document.getElementById('status-text');
        const roleSelection = document.getElementById('role-selection');
        const broadcasterUi = document.getElementById('broadcaster-ui');
        const viewerUi = document.getElementById('viewer-ui');
        
        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');
        
        const btnRoleBroadcaster = document.getElementById('btn-role-broadcaster');
        const btnRoleViewer = document.getElementById('btn-role-viewer');
        
        const roomIdDisplay = document.getElementById('room-id-display');
        const cameraSelect = document.getElementById('camera-select');
        const btnToggleWake = document.getElementById('btn-toggle-wake');
        const wakeIcon = document.getElementById('wake-icon');
        
        const joinRoomInput = document.getElementById('join-room-input');
        const btnJoinRoom = document.getElementById('btn-join-room');

        // Inicialização do Firebase (Respeitando regras de Canvas)
        let db, auth, appId;
        try {
            const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
            appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
            
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (error) {
            statusText.innerText = "Erro Crítico: Configuração do Firebase ausente no ambiente.";
            console.error(error);
        }

        // Caminhos Base do Firestore (Obrigatório seguir a regra estrita)
        const getRoomDocRef = (roomId) => doc(db, 'artifacts', appId, 'public', 'data', 'webrtc_rooms', roomId);
        const getCallerCandidatesRef = (roomId) => collection(db, 'artifacts', appId, 'public', 'data', 'webrtc_rooms', roomId, 'callerCandidates');
        const getCalleeCandidatesRef = (roomId) => collection(db, 'artifacts', appId, 'public', 'data', 'webrtc_rooms', roomId, 'calleeCandidates');

        // Autenticação Inicial
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                statusText.innerText = "Erro de Autenticação.";
                console.error(error);
            }
        }

        // Utilitário para gerar ID curto
        function generateRoomId() {
            return Math.floor(100000 + Math.random() * 900000).toString(); // 6 digitos
        }

        // ==========================================
        // Lógica: Câmera e Dispositivos
        // ==========================================
        async function getCameras() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                
                cameraSelect.innerHTML = '';
                videoDevices.forEach(device => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Câmera ${cameraSelect.length + 1}`;
                    cameraSelect.appendChild(option);
                });
            } catch (error) {
                console.error("Erro ao listar câmeras:", error);
            }
        }

        async function openCamera(deviceId = null) {
            const constraints = {
                video: deviceId ? { deviceId: { exact: deviceId } } : { facingMode: "environment" },
                audio: true // Captura áudio também
            };

            try {
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                localVideo.srcObject = localStream;
                
                // Se já existir conexão P2P, substitui a track de vídeo
                if (peerConnection) {
                    const videoTrack = localStream.getVideoTracks()[0];
                    const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                    if (sender && videoTrack) {
                        sender.replaceTrack(videoTrack);
                    }
                }
                return true;
            } catch (error) {
                statusText.innerText = "Erro: Permissão de câmera negada.";
                console.error("Erro ao abrir câmera:", error);
                return false;
            }
        }

        cameraSelect.addEventListener('change', async (e) => {
            const deviceId = e.target.value;
            statusText.innerText = "Trocando câmera...";
            await openCamera(deviceId);
            statusText.innerText = "Câmera trocada. Transmitindo.";
        });

        // ==========================================
        // Lógica: Screen Wake Lock
        // ==========================================
        async function toggleWakeLock() {
            if (!('wakeLock' in navigator)) {
                statusText.innerText = "Wake Lock API não suportada neste navegador.";
                return;
            }

            try {
                if (wakeLock !== null) {
                    await wakeLock.release();
                    wakeLock = null;
                    btnToggleWake.classList.replace('bg-green-600', 'bg-yellow-600');
                    btnToggleWake.classList.replace('hover:bg-green-700', 'hover:bg-yellow-700');
                    wakeIcon.innerText = '🔓';
                    btnToggleWake.innerHTML = '<span id="wake-icon">🔓</span> Tela: Desprotegida';
                } else {
                    wakeLock = await navigator.wakeLock.request('screen');
                    btnToggleWake.classList.replace('bg-yellow-600', 'bg-green-600');
                    btnToggleWake.classList.replace('hover:bg-yellow-700', 'hover:bg-green-700');
                    wakeIcon.innerText = '🔒';
                    btnToggleWake.innerHTML = '<span id="wake-icon">🔒</span> Tela: Ativa (Não apaga)';
                    
                    wakeLock.addEventListener('release', () => {
                        console.log('Wake Lock liberado pelo sistema.');
                    });
                }
            } catch (err) {
                console.error(`Erro Wake Lock: ${err.name}, ${err.message}`);
            }
        }
        btnToggleWake.addEventListener('click', toggleWakeLock);

        // ==========================================
        // Lógica P2P: Transmissor (Broadcaster)
        // ==========================================
        async function startBroadcasting() {
            if (!currentUserId) return;
            
            roleSelection.classList.add('hidden');
            broadcasterUi.classList.remove('hidden');
            broadcasterUi.classList.add('flex');
            statusText.innerText = "Solicitando permissão da câmera...";

            const cameraOpened = await openCamera();
            if (!cameraOpened) return;
            await getCameras(); // Popula o select após pegar permissão real

            currentRoomId = generateRoomId();
            roomIdDisplay.innerText = currentRoomId;
            statusText.innerText = `Sala criada. Aguardando conexão do cliente...`;

            peerConnection = new RTCPeerConnection(configuration);
            
            // Adiciona as tracks locais à conexão P2P
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });

            const roomRef = getRoomDocRef(currentRoomId);
            const callerCandidatesRef = getCallerCandidatesRef(currentRoomId);

            // Coleta candidatos ICE locais (Transmissor) e salva no Firestore
            peerConnection.addEventListener('icecandidate', async event => {
                if (event.candidate) {
                    await addDoc(callerCandidatesRef, event.candidate.toJSON());
                }
            });

            // Cria a Oferta SDP
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            const roomWithOffer = {
                offer: { type: offer.type, sdp: offer.sdp },
                createdAt: new Date().getTime(),
                broadcasterId: currentUserId
            };
            await setDoc(roomRef, roomWithOffer);

            // Escuta a Resposta do Cliente
            onSnapshot(roomRef, async snapshot => {
                const data = snapshot.data();
                if (!peerConnection.currentRemoteDescription && data && data.answer) {
                    statusText.innerText = "Cliente conectado! Estabelecendo P2P...";
                    const rtcSessionDescription = new RTCSessionDescription(data.answer);
                    await peerConnection.setRemoteDescription(rtcSessionDescription);
                }
            }, (error) => console.error("Erro snapshot sala:", error));

            // Escuta os candidatos ICE do Cliente
            onSnapshot(getCalleeCandidatesRef(currentRoomId), snapshot => {
                snapshot.docChanges().forEach(async change => {
                    if (change.type === 'added') {
                        let data = change.doc.data();
                        await peerConnection.addIceCandidate(new RTCIceCandidate(data));
                    }
                });
            }, (error) => console.error("Erro snapshot ICE callee:", error));
            
            // Tenta ativar Wake Lock automaticamente
            toggleWakeLock();
        }

        // ==========================================
        // Lógica P2P: Visualizador (Viewer)
        // ==========================================
        async function joinRoom() {
            if (!currentUserId) return;
            
            const roomId = joinRoomInput.value.trim();
            if (!roomId) {
                alert("Digite um ID de sala válido."); // Fallback nativo simples aceitável aqui apenas para validação síncrona
                return;
            }

            statusText.innerText = "Conectando à sala...";
            const roomRef = getRoomDocRef(roomId);
            const roomSnapshot = await getDoc(roomRef);

            if (!roomSnapshot.exists()) {
                statusText.innerText = "Erro: Sala não encontrada.";
                return;
            }

            roleSelection.classList.add('hidden');
            viewerUi.classList.remove('hidden');
            viewerUi.classList.add('flex');

            peerConnection = new RTCPeerConnection(configuration);
            
            // Prepara elemento de vídeo remoto
            remoteStream = new MediaStream();
            remoteVideo.srcObject = remoteStream;

            // Ao receber tracks do transmissor, adiciona ao vídeo remoto
            peerConnection.addEventListener('track', event => {
                event.streams[0].getTracks().forEach(track => {
                    remoteStream.addTrack(track);
                });
                statusText.innerText = "Recebendo transmissão ao vivo.";
            });

            const calleeCandidatesRef = getCalleeCandidatesRef(roomId);
            
            // Coleta candidatos ICE locais (Visualizador)
            peerConnection.addEventListener('icecandidate', async event => {
                if (event.candidate) {
                    await addDoc(calleeCandidatesRef, event.candidate.toJSON());
                }
            });

            // Extrai Oferta e gera Resposta
            const offer = roomSnapshot.data().offer;
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            const roomWithAnswer = { answer: { type: answer.type, sdp: answer.sdp } };
            await updateDoc(roomRef, roomWithAnswer);

            // Escuta ICE do Transmissor
            onSnapshot(getCallerCandidatesRef(roomId), snapshot => {
                snapshot.docChanges().forEach(async change => {
                    if (change.type === 'added') {
                        let data = change.doc.data();
                        await peerConnection.addIceCandidate(new RTCIceCandidate(data));
                    }
                });
            }, (error) => console.error("Erro snapshot ICE caller:", error));
        }

        // Listeners de UI
        btnRoleBroadcaster.addEventListener('click', startBroadcasting);
        btnRoleViewer.addEventListener('click', joinRoom);

        // Fluxo principal (Auth -> Init)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserId = user.uid;
                statusText.innerText = "Autenticado. Pronto para uso.";
            } else {
                currentUserId = null;
            }
        });

        // Inicia o app garantindo a autenticação
        initAuth();

    </script>
</body>
</html>
