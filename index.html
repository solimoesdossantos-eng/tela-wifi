<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebRTC Monitor (PIN Mode)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Importação do PeerJS (Servidor de Sinalização Público) -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background-color: #111827; color: #f3f4f6; font-family: sans-serif; }
        video { width: 100%; max-height: 50vh; background: #000; border-radius: 0.5rem; object-fit: cover; }
        .hidden { display: none !important; }
        input { text-transform: uppercase; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- Header -->
    <header class="w-full max-w-2xl text-center mb-6">
        <h1 class="text-2xl font-bold text-blue-400">Monitor P2P - Modo PIN</h1>
        <p class="text-xs text-gray-400 mt-1" id="status-text">Pronto. Escolha a função.</p>
    </header>

    <!-- Seleção de Papel (Role) -->
    <main id="role-selection" class="w-full max-w-sm bg-gray-800 p-6 rounded-lg shadow-lg text-center flex flex-col gap-4">
        <button id="btn-role-broadcaster" class="bg-blue-600 hover:bg-blue-700 font-bold py-3 px-4 rounded transition-colors">
            🎥 Iniciar Servidor (Transmitir Câmera)
        </button>
        <button id="btn-role-viewer" class="bg-green-600 hover:bg-green-700 font-bold py-3 px-4 rounded transition-colors">
            👀 Iniciar Cliente (Assistir)
        </button>
    </main>

    <!-- Interface do Transmissor (Servidor) -->
    <section id="broadcaster-ui" class="w-full max-w-2xl hidden flex-col gap-4">
        <div class="bg-gray-800 p-4 rounded-lg shadow flex flex-col gap-4">
            
            <div class="flex flex-col sm:flex-row justify-between gap-4">
                <select id="camera-select" class="bg-gray-700 text-white text-sm rounded p-2 border border-gray-600 w-full sm:w-1/2 focus:outline-none focus:border-blue-500">
                    <option value="">Carregando câmeras...</option>
                </select>
                <button id="btn-toggle-wake" class="bg-yellow-600 hover:bg-yellow-700 text-sm py-2 px-3 rounded transition-colors flex items-center justify-center gap-2 sm:w-1/2">
                    <span id="wake-icon">🔓</span> Tela: Desprotegida
                </button>
            </div>

            <div class="border-t border-gray-700 pt-4 text-center">
                <span class="text-sm text-gray-400 block mb-2">Informe este PIN ao Cliente:</span>
                <div class="text-4xl font-mono font-bold tracking-widest text-yellow-400 bg-gray-900 py-3 rounded-lg border border-gray-700" id="pin-display">
                    ------
                </div>
            </div>
        </div>
        
        <video id="local-video" autoplay playsinline muted></video>
        <p class="text-xs text-center text-gray-500 mt-2">Atenção: Mantenha a tela ligada. Abaixe o brilho manualmente se necessário.</p>
    </section>

    <!-- Interface do Visualizador (Cliente) -->
    <section id="viewer-ui" class="w-full max-w-2xl hidden flex-col gap-4">
        <div class="bg-gray-800 p-4 rounded-lg shadow flex flex-col gap-4">
            
            <div>
                <label class="text-sm text-gray-400 block mb-2 text-center">Digite o PIN do Servidor:</label>
                <div class="flex flex-col sm:flex-row gap-2">
                    <input type="text" id="viewer-pin-input" maxlength="6" class="flex-1 bg-gray-900 text-white text-3xl font-mono text-center tracking-widest p-3 rounded-lg border border-gray-600 focus:outline-none focus:border-green-500 placeholder-gray-700" placeholder="000000">
                    <button id="btn-connect-viewer" class="bg-green-600 hover:bg-green-700 font-bold py-3 px-6 rounded-lg transition-colors w-full sm:w-auto">
                        Conectar
                    </button>
                </div>
            </div>
        </div>

        <video id="remote-video" autoplay playsinline></video>
    </section>

    <script>
        // ==========================================
        // Estado Global e Variáveis
        // ==========================================
        let peer = null;
        let localStream = null;
        let remoteStream = null;
        let wakeLock = null;
        let myPin = null;

        // Elementos DOM
        const statusText = document.getElementById('status-text');
        const roleSelection = document.getElementById('role-selection');
        
        // UI Transmissor
        const broadcasterUi = document.getElementById('broadcaster-ui');
        const localVideo = document.getElementById('local-video');
        const cameraSelect = document.getElementById('camera-select');
        const btnToggleWake = document.getElementById('btn-toggle-wake');
        const wakeIcon = document.getElementById('wake-icon');
        const pinDisplay = document.getElementById('pin-display');
        
        // UI Visualizador
        const viewerUi = document.getElementById('viewer-ui');
        const remoteVideo = document.getElementById('remote-video');
        const viewerPinInput = document.getElementById('viewer-pin-input');
        const btnConnectViewer = document.getElementById('btn-connect-viewer');

        // ==========================================
        // Utilitários
        // ==========================================
        function generatePIN() {
            // Gera um PIN alfanumérico de 6 dígitos
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // Removido I, O, 0, 1 para evitar confusão visual
            let result = '';
            for (let i = 0; i < 6; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        // ==========================================
        // Lógica: Câmera e Dispositivos
        // ==========================================
        async function getCameras() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                
                cameraSelect.innerHTML = '';
                videoDevices.forEach(device => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Câmera ${cameraSelect.length + 1}`;
                    cameraSelect.appendChild(option);
                });
            } catch (error) {
                console.error("Erro ao listar câmeras:", error);
            }
        }

        async function openCamera(deviceId = null) {
            const constraints = {
                video: deviceId ? { deviceId: { exact: deviceId } } : { facingMode: "environment" },
                audio: true 
            };

            try {
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                localVideo.srcObject = localStream;
                
                // Trata a troca de câmera a quente se já houver chamadas P2P ativas
                if (peer && peer.connections) {
                    const videoTrack = localStream.getVideoTracks()[0];
                    // Itera sobre todas as conexões PeerJS ativas e substitui a track
                    for (let peerId in peer.connections) {
                        const connections = peer.connections[peerId];
                        connections.forEach(conn => {
                            if(conn.peerConnection) {
                                const sender = conn.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                                if (sender && videoTrack) {
                                    sender.replaceTrack(videoTrack);
                                }
                            }
                        });
                    }
                }
                return true;
            } catch (error) {
                statusText.innerHTML = "<span class='text-red-500 font-bold'>Erro: Permissão de câmera negada.</span>";
                console.error(error);
                return false;
            }
        }

        cameraSelect.addEventListener('change', async (e) => {
            const deviceId = e.target.value;
            statusText.innerText = "Trocando câmera...";
            await openCamera(deviceId);
            statusText.innerText = "Câmera trocada. Transmitindo P2P.";
        });

        // ==========================================
        // Lógica: Screen Wake Lock
        // ==========================================
        async function toggleWakeLock() {
            if (!('wakeLock' in navigator)) {
                alert("Wake Lock API não suportada no seu navegador.");
                return;
            }
            try {
                if (wakeLock !== null) {
                    await wakeLock.release();
                    wakeLock = null;
                    btnToggleWake.classList.replace('bg-green-600', 'bg-yellow-600');
                    wakeIcon.innerText = '🔓';
                } else {
                    wakeLock = await navigator.wakeLock.request('screen');
                    btnToggleWake.classList.replace('bg-yellow-600', 'bg-green-600');
                    wakeIcon.innerText = '🔒';
                }
            } catch (err) {
                console.error(`Erro Wake Lock: ${err.message}`);
            }
        }
        btnToggleWake.addEventListener('click', toggleWakeLock);

        // ==========================================
        // Fluxo P2P: Transmissor (Servidor)
        // ==========================================
        document.getElementById('btn-role-broadcaster').addEventListener('click', async () => {
            roleSelection.classList.add('hidden');
            broadcasterUi.classList.remove('hidden');
            broadcasterUi.classList.add('flex');
            statusText.innerText = "Preparando servidor local e câmera...";

            const cameraOpened = await openCamera();
            if (!cameraOpened) return;
            await getCameras();

            // Gera PIN e inicia PeerJS com este ID específico
            myPin = generatePIN();
            pinDisplay.innerText = myPin;
            statusText.innerText = "Conectando ao servidor de sinalização (PeerJS Cloud)...";

            // Prefixo aplicado para evitar colisões no servidor público do PeerJS
            const peerId = `p2p-cam-${myPin}`; 
            
            peer = new Peer(peerId, {
                debug: 2 // Log moderado no console
            });

            peer.on('open', (id) => {
                statusText.innerText = "Servidor P2P Online. Aguardando conexão do cliente...";
            });

            // 1. Cliente se conecta primariamente via canal de DADOS para anunciar que chegou
            peer.on('connection', (conn) => {
                conn.on('open', () => {
                    statusText.innerText = `Cliente detectado! Estabelecendo fluxo de mídia...`;
                    
                    // 2. Servidor dispara a chamada de mídia de volta para o ID do cliente
                    const call = peer.call(conn.peer, localStream);
                    
                    call.on('error', (err) => {
                        console.error("Erro na chamada:", err);
                        statusText.innerHTML = "<span class='text-red-500'>Erro na transmissão do vídeo.</span>";
                    });
                });
            });

            peer.on('error', (err) => {
                console.error("PeerJS Erro:", err);
                statusText.innerHTML = `<span class='text-red-500 font-bold'>Erro P2P: ${err.type}</span>`;
            });

            toggleWakeLock();
        });

        // ==========================================
        // Fluxo P2P: Visualizador (Cliente)
        // ==========================================
        document.getElementById('btn-role-viewer').addEventListener('click', () => {
            roleSelection.classList.add('hidden');
            viewerUi.classList.remove('hidden');
            viewerUi.classList.add('flex');
            statusText.innerText = "Aguardando PIN do Transmissor...";
            
            // Inicia cliente com ID aleatório gerado pelo PeerJS
            peer = new Peer({ debug: 2 });
            
            peer.on('open', (id) => {
                statusText.innerText = "Cliente P2P pronto. Digite o PIN.";
            });

            // Escuta ativamente por chamadas de mídia vindas do Transmissor
            peer.on('call', (call) => {
                statusText.innerText = "Recebendo transmissão...";
                
                // O cliente atende a chamada sem enviar stream próprio (apenas recebe)
                call.answer(); 
                
                call.on('stream', (incomingStream) => {
                    remoteStream = incomingStream;
                    remoteVideo.srcObject = remoteStream;
                    statusText.innerText = "Transmissão P2P Estabelecida!";
                    statusText.classList.add('text-green-400');
                });
            });

            peer.on('error', (err) => {
                console.error("PeerJS Erro:", err);
                statusText.innerHTML = `<span class='text-red-500 font-bold'>Erro P2P: ${err.type}</span>`;
            });
        });

        btnConnectViewer.addEventListener('click', () => {
            const rawPin = viewerPinInput.value.trim().toUpperCase();
            if (rawPin.length !== 6) {
                alert("O PIN deve conter exatamente 6 caracteres.");
                return;
            }

            statusText.innerText = "Buscando servidor através do PIN...";
            const targetPeerId = `p2p-cam-${rawPin}`;

            // 1. Cliente tenta abrir canal de dados com o Servidor baseado no PIN
            const conn = peer.connect(targetPeerId);

            conn.on('open', () => {
                statusText.innerText = "Conectado ao transmissor. Solicitando vídeo...";
                // O Servidor receberá este evento e disparará o peer.call (ver bloco do servidor acima)
            });

            conn.on('error', (err) => {
                statusText.innerHTML = "<span class='text-red-500 font-bold'>Falha ao conectar. Verifique o PIN.</span>";
            });
        });

        // Formatação visual do Input do PIN
        viewerPinInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^A-Z0-9]/ig, '').toUpperCase();
        });

    </script>
</body>
</html>
