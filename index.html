<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Mic Stream - Background Mode</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #0f0f0f;
            color: #e0e0e0;
        }
        .container {
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            background: #1a1a1a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #status-light {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #444;
            display: inline-block;
            margin-right: 10px;
        }
        .active { background: #ff0000 !important; box-shadow: 0 0 10px #ff0000; }
        button {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background: linear-gradient(145deg, #007bff, #0056b3);
            color: white;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.95); }
        #log { font-size: 0.8rem; color: #888; margin-top: 20px; max-width: 250px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Background Mic</h1>
        <div style="margin-bottom: 20px;">
            <span id="status-light"></span>
            <span id="status-text">Status: Offline</span>
        </div>
        <button id="initBtn">INICIAR MONITORAMENTO</button>
        <div id="log">Aperte o botão e não feche a aba. Funciona melhor com fones.</div>
    </div>

    <audio id="silentAudio" loop>
        <source src="https://raw.githubusercontent.com/anars/blank-audio/master/250-milliseconds-of-silence.mp3" type="audio/mp3">
    </audio>

    <script>
        const initBtn = document.getElementById('initBtn');
        const statusLight = document.getElementById('status-light');
        const statusText = document.getElementById('status-text');
        const silentAudio = document.getElementById('silentAudio');

        let wakeLock = null;

        // Função para impedir que a tela apague (se suportado)
        const requestWakeLock = async () => {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock ativo');
                }
            } catch (err) {
                console.error(`${err.name}, ${err.message}`);
            }
        };

        initBtn.onclick = async () => {
            try {
                // 1. Solicita Microfone
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    } 
                });

                // 2. Inicia áudio silencioso para "enganar" o sistema operacional
                await silentAudio.play();

                // 3. Configura o AudioContext
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                
                // Conecta o microfone à saída (Speaker) 
                // Se o objetivo for gravar ou enviar para servidor, a lógica entra aqui
                source.connect(audioContext.destination);

                // 4. Solicita Wake Lock
                await requestWakeLock();

                // Interface
                statusLight.classList.add('active');
                statusText.innerText = "Status: MONITORANDO";
                initBtn.style.display = 'none';

                console.log("Sistema rodando em background...");

            } catch (err) {
                alert("Erro: Certifique-se de usar HTTPS e dar permissão ao microfone.");
                console.error(err);
            }
        };

        // Reativar Wake Lock se o app voltar de um estado minimizado
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });
    </script>
</body>
</html>
