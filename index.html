<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebRTC Manual P2P Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #111827; color: #f3f4f6; font-family: sans-serif; }
        video { width: 100%; max-height: 50vh; background: #000; border-radius: 0.5rem; object-fit: cover; }
        .hidden { display: none !important; }
        textarea { resize: none; font-family: monospace; font-size: 0.75rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- Header -->
    <header class="w-full max-w-2xl text-center mb-6">
        <h1 class="text-2xl font-bold text-blue-400">Monitor P2P - Modo Manual (Sem DB)</h1>
        <p class="text-xs text-gray-400 mt-1" id="status-text">Pronto. Escolha a função.</p>
    </header>

    <!-- Seleção de Papel (Role) -->
    <main id="role-selection" class="w-full max-w-sm bg-gray-800 p-6 rounded-lg shadow-lg text-center flex flex-col gap-4">
        <button id="btn-role-broadcaster" class="bg-blue-600 hover:bg-blue-700 font-bold py-3 px-4 rounded transition-colors">
            🎥 Iniciar Servidor (Câmera)
        </button>
        <button id="btn-role-viewer" class="bg-green-600 hover:bg-green-700 font-bold py-3 px-4 rounded transition-colors">
            👀 Iniciar Cliente (Visualizador)
        </button>
    </main>

    <!-- Interface do Transmissor -->
    <section id="broadcaster-ui" class="w-full max-w-2xl hidden flex-col gap-4">
        <div class="bg-gray-800 p-4 rounded-lg shadow flex flex-col gap-4">
            
            <div class="flex flex-col sm:flex-row justify-between gap-4">
                <select id="camera-select" class="bg-gray-700 text-white text-sm rounded p-2 border border-gray-600 w-full sm:w-1/2">
                    <option value="">Carregando câmeras...</option>
                </select>
                <button id="btn-toggle-wake" class="bg-yellow-600 hover:bg-yellow-700 text-sm py-2 px-3 rounded transition-colors flex items-center justify-center gap-2 sm:w-1/2">
                    <span id="wake-icon">🔓</span> Tela: Desprotegida
                </button>
            </div>

            <div class="border-t border-gray-700 pt-4">
                <label class="text-sm text-yellow-400 font-bold block mb-1">1. Seu Token (Copie e envie ao Cliente):</label>
                <textarea id="broadcaster-offer-text" class="w-full bg-gray-900 text-gray-300 p-2 rounded h-20 outline-none" readonly placeholder="Aguardando geração da oferta..."></textarea>
                <button id="btn-copy-offer" class="mt-2 bg-gray-600 hover:bg-gray-500 text-xs py-1 px-3 rounded w-full">Copiar Meu Token</button>
            </div>

            <div class="border-t border-gray-700 pt-4">
                <label class="text-sm text-green-400 font-bold block mb-1">4. Cole aqui o Token Resposta do Cliente:</label>
                <textarea id="broadcaster-answer-input" class="w-full bg-gray-700 text-white p-2 rounded h-20 outline-none focus:border-blue-500 border border-gray-600" placeholder="Cole o token recebido do cliente aqui..."></textarea>
                <button id="btn-connect-broadcaster" class="mt-2 bg-blue-600 hover:bg-blue-700 font-bold py-2 px-4 rounded w-full">Conectar P2P</button>
            </div>
        </div>
        
        <video id="local-video" autoplay playsinline muted></video>
    </section>

    <!-- Interface do Visualizador -->
    <section id="viewer-ui" class="w-full max-w-2xl hidden flex-col gap-4">
        <div class="bg-gray-800 p-4 rounded-lg shadow flex flex-col gap-4">
            
            <div>
                <label class="text-sm text-yellow-400 font-bold block mb-1">2. Cole o Token do Servidor aqui:</label>
                <textarea id="viewer-offer-input" class="w-full bg-gray-700 text-white p-2 rounded h-20 outline-none focus:border-green-500 border border-gray-600" placeholder="Cole o token do Servidor/Câmera aqui..."></textarea>
                <button id="btn-generate-answer" class="mt-2 bg-green-600 hover:bg-green-700 font-bold py-2 px-4 rounded w-full">Gerar Minha Resposta</button>
            </div>

            <div class="border-t border-gray-700 pt-4 hidden" id="viewer-answer-section">
                <label class="text-sm text-green-400 font-bold block mb-1">3. Seu Token Resposta (Envie de volta ao Servidor):</label>
                <textarea id="viewer-answer-text" class="w-full bg-gray-900 text-gray-300 p-2 rounded h-20 outline-none" readonly></textarea>
                <button id="btn-copy-answer" class="mt-2 bg-gray-600 hover:bg-gray-500 text-xs py-1 px-3 rounded w-full">Copiar Minha Resposta</button>
            </div>
        </div>

        <video id="remote-video" autoplay playsinline></video>
    </section>

    <script>
        // Servidores STUN públicos (Obrigatórios para descobrir IPs através do NAT)
        const configuration = {
            iceServers: [
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ]
        };

        let peerConnection = null;
        let localStream = null;
        let remoteStream = null;
        let wakeLock = null;

        // Elementos DOM
        const statusText = document.getElementById('status-text');
        const roleSelection = document.getElementById('role-selection');
        
        // UI Transmissor
        const broadcasterUi = document.getElementById('broadcaster-ui');
        const localVideo = document.getElementById('local-video');
        const cameraSelect = document.getElementById('camera-select');
        const btnToggleWake = document.getElementById('btn-toggle-wake');
        const wakeIcon = document.getElementById('wake-icon');
        const broadcasterOfferText = document.getElementById('broadcaster-offer-text');
        const btnCopyOffer = document.getElementById('btn-copy-offer');
        const broadcasterAnswerInput = document.getElementById('broadcaster-answer-input');
        const btnConnectBroadcaster = document.getElementById('btn-connect-broadcaster');
        
        // UI Visualizador
        const viewerUi = document.getElementById('viewer-ui');
        const remoteVideo = document.getElementById('remote-video');
        const viewerOfferInput = document.getElementById('viewer-offer-input');
        const btnGenerateAnswer = document.getElementById('btn-generate-answer');
        const viewerAnswerSection = document.getElementById('viewer-answer-section');
        const viewerAnswerText = document.getElementById('viewer-answer-text');
        const btnCopyAnswer = document.getElementById('btn-copy-answer');

        // ==========================================
        // Utilitários de Tokenização (SDP para Base64)
        // ==========================================
        function encodeToken(obj) {
            return btoa(JSON.stringify(obj));
        }

        function decodeToken(token) {
            try {
                return JSON.parse(atob(token));
            } catch (e) {
                alert("Token inválido ou corrompido.");
                return null;
            }
        }

        function copyToClipboard(elementId) {
            const copyText = document.getElementById(elementId);
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            document.execCommand('copy');
            alert("Token copiado para a área de transferência!");
        }

        // ==========================================
        // Lógica: Câmera e Dispositivos
        // ==========================================
        async function getCameras() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                
                cameraSelect.innerHTML = '';
                videoDevices.forEach(device => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Câmera ${cameraSelect.length + 1}`;
                    cameraSelect.appendChild(option);
                });
            } catch (error) {
                console.error("Erro ao listar câmeras:", error);
            }
        }

        async function openCamera(deviceId = null) {
            const constraints = {
                video: deviceId ? { deviceId: { exact: deviceId } } : { facingMode: "environment" },
                audio: true 
            };

            try {
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                localVideo.srcObject = localStream;
                
                if (peerConnection) {
                    const videoTrack = localStream.getVideoTracks()[0];
                    const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                    if (sender && videoTrack) {
                        sender.replaceTrack(videoTrack);
                    }
                }
                return true;
            } catch (error) {
                statusText.innerHTML = "<span class='text-red-500 font-bold'>Erro: Permissão de câmera negada.</span>";
                return false;
            }
        }

        cameraSelect.addEventListener('change', async (e) => {
            const deviceId = e.target.value;
            statusText.innerText = "Trocando câmera...";
            await openCamera(deviceId);
        });

        // ==========================================
        // Lógica: Screen Wake Lock
        // ==========================================
        async function toggleWakeLock() {
            if (!('wakeLock' in navigator)) {
                alert("Wake Lock API não suportada.");
                return;
            }
            try {
                if (wakeLock !== null) {
                    await wakeLock.release();
                    wakeLock = null;
                    btnToggleWake.classList.replace('bg-green-600', 'bg-yellow-600');
                    wakeIcon.innerText = '🔓';
                } else {
                    wakeLock = await navigator.wakeLock.request('screen');
                    btnToggleWake.classList.replace('bg-yellow-600', 'bg-green-600');
                    wakeIcon.innerText = '🔒';
                }
            } catch (err) {
                console.error(`Erro Wake Lock: ${err.message}`);
            }
        }
        btnToggleWake.addEventListener('click', toggleWakeLock);

        // ==========================================
        // Fluxo P2P: Transmissor (Servidor)
        // ==========================================
        document.getElementById('btn-role-broadcaster').addEventListener('click', async () => {
            roleSelection.classList.add('hidden');
            broadcasterUi.classList.remove('hidden');
            broadcasterUi.classList.add('flex');
            statusText.innerText = "Preparando servidor local...";

            const cameraOpened = await openCamera();
            if (!cameraOpened) return;
            await getCameras();

            peerConnection = new RTCPeerConnection(configuration);

            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });

            // Gerar Oferta
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            // IMPORTANTE: Em sinalização manual, devemos esperar a coleta de TODOS os ICE candidates (STUN)
            // antes de entregar o token para o usuário copiar.
            peerConnection.onicegatheringstatechange = () => {
                if (peerConnection.iceGatheringState === 'complete') {
                    const fullOffer = peerConnection.localDescription;
                    broadcasterOfferText.value = encodeToken(fullOffer);
                    statusText.innerText = "Token gerado. Copie e envie para o cliente.";
                }
            };
            
            // Tratamento de segurança caso o state 'complete' não dispare rapidamente em algumas redes
            setTimeout(() => {
                if (broadcasterOfferText.value === "" && peerConnection.iceGatheringState !== 'new') {
                     broadcasterOfferText.value = encodeToken(peerConnection.localDescription);
                }
            }, 3000);

            toggleWakeLock();
        });

        btnCopyOffer.addEventListener('click', () => copyToClipboard('broadcaster-offer-text'));

        btnConnectBroadcaster.addEventListener('click', async () => {
            const answerToken = broadcasterAnswerInput.value.trim();
            if (!answerToken) {
                alert("Cole o token do cliente primeiro.");
                return;
            }

            const answerDesc = decodeToken(answerToken);
            if (!answerDesc) return;

            try {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(answerDesc));
                statusText.innerText = "Conexão P2P Estabelecida!";
                broadcasterAnswerInput.value = "";
            } catch (e) {
                statusText.innerHTML = "<span class='text-red-500 font-bold'>Erro ao processar resposta do cliente.</span>";
                console.error(e);
            }
        });

        // ==========================================
        // Fluxo P2P: Visualizador (Cliente)
        // ==========================================
        document.getElementById('btn-role-viewer').addEventListener('click', () => {
            roleSelection.classList.add('hidden');
            viewerUi.classList.remove('hidden');
            viewerUi.classList.add('flex');
            statusText.innerText = "Aguardando token do Servidor...";
        });

        btnGenerateAnswer.addEventListener('click', async () => {
            const offerToken = viewerOfferInput.value.trim();
            if (!offerToken) {
                alert("Cole o token do servidor primeiro.");
                return;
            }

            const offerDesc = decodeToken(offerToken);
            if (!offerDesc) return;

            peerConnection = new RTCPeerConnection(configuration);
            remoteStream = new MediaStream();
            remoteVideo.srcObject = remoteStream;

            peerConnection.addEventListener('track', event => {
                event.streams[0].getTracks().forEach(track => {
                    remoteStream.addTrack(track);
                });
                statusText.innerText = "Recebendo stream direta.";
            });

            try {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(offerDesc));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);

                viewerAnswerSection.classList.remove('hidden');
                statusText.innerText = "Coletando rotas de rede...";

                // Aguarda coleta ICE para gerar token completo
                peerConnection.onicegatheringstatechange = () => {
                    if (peerConnection.iceGatheringState === 'complete') {
                        const fullAnswer = peerConnection.localDescription;
                        viewerAnswerText.value = encodeToken(fullAnswer);
                        statusText.innerText = "Token de Resposta gerado. Envie de volta ao servidor.";
                    }
                };

                setTimeout(() => {
                    if (viewerAnswerText.value === "" && peerConnection.iceGatheringState !== 'new') {
                         viewerAnswerText.value = encodeToken(peerConnection.localDescription);
                    }
                }, 3000);

            } catch (e) {
                statusText.innerHTML = "<span class='text-red-500 font-bold'>Erro ao gerar resposta. Token do servidor pode ser inválido.</span>";
                console.error(e);
            }
        });

        btnCopyAnswer.addEventListener('click', () => copyToClipboard('viewer-answer-text'));

        // ==========================================
        // Monitoramento de Conexão
        // ==========================================
        function setupConnectionMonitoring() {
            if(!peerConnection) return;
            peerConnection.onconnectionstatechange = () => {
                if (peerConnection.connectionState === 'connected') {
                    statusText.innerText = "Conexão P2P Estabelecida! (Direto)";
                    statusText.classList.add('text-green-400');
                } else if (peerConnection.connectionState === 'disconnected' || peerConnection.connectionState === 'failed') {
                    statusText.innerText = "Conexão perdida. É necessário reiniciar o processo manual.";
                    statusText.classList.add('text-red-500');
                }
            };
        }
        
        // Adiciona listener de monitoramento no click dos papéis
        document.getElementById('btn-role-broadcaster').addEventListener('click', () => { setTimeout(setupConnectionMonitoring, 1000) });
        btnGenerateAnswer.addEventListener('click', () => { setTimeout(setupConnectionMonitoring, 1000) });

    </script>
</body>
</html>
